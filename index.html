:root{
  --ink:#1C1815; --paper:#FFFDF9; --surface:#F7F3EA; --surfaceAlt:#FBF8F2;
  --line:#E7DFCC; --gold:#B08A3E; --goldDeep:#8C6C2E; --goldSoft:#EFE4C4;
  --success:#3F7D5C; --successSoft:#E4F0E9; --danger:#B3452C; --dangerSoft:#F6E5DF; --muted:#8A8172;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink);}
.serif{font-family:'Playfair Display',serif;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}

.btn{display:inline-flex;align-items:center;gap:6px;border-radius:12px;padding:9px 14px;font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--paper);color:var(--ink);white-space:nowrap;}
.btn:hover{background:var(--surfaceAlt);}
.btn-dark{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.btn-dark:hover{opacity:.9;}
.btn-ghost{border:none;background:transparent;padding:6px;border-radius:10px;}
.btn-ghost:hover{background:rgba(0,0,0,.05);}
.card{background:var(--paper);border:1px solid var(--line);border-radius:16px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;}
.input{width:100%;border:1px solid var(--line);background:var(--surfaceAlt);border-radius:12px;padding:9px 12px;font-size:13px;outline:none;}
.label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.03em;}
.field{display:flex;flex-direction:column;gap:2px;margin-bottom:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
@media(max-width:640px){.grid2{grid-template-columns:1fr;}}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:var(--surface);white-space:nowrap;}
td{padding:10px 12px;border-top:1px solid var(--line);white-space:nowrap;}
.modal-bg{position:fixed;inset:0;background:rgba(28,24,21,.5);display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;z-index:60;}
.modal{background:var(--paper);border-radius:18px;width:100%;max-width:640px;margin:24px 0;}
.navitem{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;font-size:13px;font-weight:600;width:100%;text-align:left;border:none;background:transparent;color:var(--ink);}
.navitem.active{background:var(--ink);color:var(--paper);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:100;}
.stat{padding:16px;display:flex;flex-direction:column;gap:8px;}
.stat .top{display:flex;justify-content:space-between;align-items:center;}
.stat .val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;}
.iconwrap{width:32px;height:32px;border-radius:999px;background:var(--goldSoft);display:flex;align-items:center;justify-content:center;}
.dochelp{font-size:11px;color:var(--muted);line-height:1.5;margin-top:10px;background:var(--surface);padding:10px 12px;border-radius:10px;}
</style>
</head>

const parseTimeRange = (text) => {
  if(!text) return {start:'',end:''};
  const m = text.match(/(\d{1,2})[:.](\d{2})\s*(am|pm)?\s*-\s*(\d{1,2})[:.](\d{2})\s*(am|pm)?/i);
  if(!m) return {start:'',end:''};
  const to24=(h,mi,ap)=>{h=parseInt(h,10); if(ap){const p=ap.toLowerCase()==='pm'; if(p&&h!==12)h+=12; if(!p&&h===12)h=0;} return `${String(h).padStart(2,'0')}:${mi}`;};
  return {start:to24(m[1],m[2],m[3]), end:to24(m[4],m[5],m[6]||m[3])};
};

const State = {

};

const K = { bookings:'kerlip:bookings', quotations:'kerlip:quotations', staff:'kerlip:staff' };

async function loadAll(){
  try{
    const snap = await getDoc(appDataRef);
    if(snap.exists()){
      const data = snap.data();
      State.bookings = Array.isArray(data.bookings) ? data.bookings : [];
      State.quotations = Array.isArray(data.quotations) ? data.quotations : [];
      State.staff = Array.isArray(data.staff) ? data.staff : [];
    } else {
      State.bookings = [sampleBooking()];
      State.quotations = [];
      State.staff = [];
      await setDoc(appDataRef, {
        bookings: State.bookings,
        quotations: State.quotations,
        staff: State.staff,
        updatedAt: new Date().toISOString()
      });
    }
  }catch(e){
    console.error("Firebase load failed:", e);
    State.bookings = [sampleBooking()];
    State.quotations = [];
    State.staff = [];
    showToast("Firebase load failed. Check Firestore rules.");
  }
  State.loading = false;
}

async function persist(key){
  try{
    await setDoc(appDataRef, {
      bookings: State.bookings,
      quotations: State.quotations,
      staff: State.staff,
      updatedAt: new Date().toISOString()
    }, { merge:true });
    console.log("Saved to Firebase:", key);
  }catch(e){
    console.error("Firebase save failed:", e);
    alert("Data not saved to Firebase. Please check Firestore Rules.");
  }
}
function showToast(msg){ State.toast = msg; render(); setTimeout(()=>{ State.toast=null; render(); }, 3200); }

function quotationTotal(q){ return num(q.pakejPrice)+num(q.addOnPrice)+num(q.transportCharges)-num(q.discount); }

}
function termsBlock(doc, y){
  if(y > 250) { doc.addPage(); y = 20; }

/* ======================= GOOGLE CALENDAR SYNC ======================= */
function buildGCalUrl(b, start, end){
  const title = `Kerlip Photobooth - ${b.namaClient} - ${b.jenisEvent||'Event'}`;
  const details = [
    `Client: ${b.namaClient}`, `Phone: ${b.noHpClient}`, `Location: ${b.lokasiEvent}`,
    `Package: ${b.pakej}`, `Backdrop: ${b.backdrop||'N/A'}`, `Add-on: ${b.pakejTambahan||'N/A'}`,
    `Total: ${rm(b.jumlahKeseluruhan)}`, `Deposit Paid: ${rm(b.bayaranDeposit)}`,
    `Balance: ${rm(b.jumlahKeseluruhan-b.bayaranDeposit)}`, `Payment Status: ${b.paymentStatus}`,
    `Contact Person (event day): ${b.namaCP||'—'}`, `Contact Person Phone: ${b.noHpCP||'—'}`,
  ].join('\n');
  const dc = b.tarikhEvent.replace(/-/g,'');
  const dates = `${dc}T${start.replace(':','')}00/${dc}T${end.replace(':','')}00`;
  const params = new URLSearchParams({action:'TEMPLATE',text:title,dates,details,location:b.lokasiEvent||'',ctz:'Asia/Kuala_Lumpur'});
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}

function renderDashboard(){
  const b = State.bookings, s = State.staff;

  const total=b.length, confirmed=b.filter(x=>x.bookingStatus==='Confirmed').length, pending=b.filter(x=>x.bookingStatus==='Pending').length;
  const paid=b.filter(x=>x.paymentStatus==='Paid').length, unpaid=b.filter(x=>x.paymentStatus==='Unpaid').length;
  const monthlyRevenue = b.filter(x=>monthKeyOf(x.tarikhEvent)===mk && x.bookingStatus!=='Cancelled').reduce((s,x)=>s+num(x.jumlahKeseluruhan),0);
  const staffThisMonth = s.filter(x=>monthKeyOf(x.eventDate)===mk);

  const staffPaid = staffThisMonth.filter(x=>x.paymentStatus==='Paid').reduce((s,x)=>s+staffTotal(x),0);
  const staffPending = staffTotalMonth - staffPaid;
  const netProfit = monthlyRevenue - staffTotalMonth;
  const upcoming = b.filter(x=>x.tarikhEvent>=todayISO() && x.bookingStatus!=='Cancelled').sort((a,c)=>a.tarikhEvent.localeCompare(c.tarikhEvent)).slice(0,6);

  return `

let calCursor = new Date();
function renderMiniCalendar(){
  const y = calCursor.getFullYear(), m = calCursor.getMonth();
  const first = new Date(y,m,1), startWd = first.getDay(), days = new Date(y,m+1,0).getDate();
  const byDate = {};
  State.bookings.forEach(b=>{ if(b.tarikhEvent){ (byDate[b.tarikhEvent]=byDate[b.tarikhEvent]||[]).push(b);} });
  let cells = ''; for(let i=0;i<startWd;i++) cells+='<div></div>';
  for(let d=1; d<=days; d++){
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has = byDate[iso]; const isToday = iso===todayISO();
    cells += `<div style="aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;position:relative;
      background:${has?'var(--goldSoft)':'transparent'};border:${isToday?'1.5px solid var(--gold)':'1px solid transparent'};
      color:${has?'var(--goldDeep)':'var(--ink)'};font-weight:${has?'700':'400'}" title="${has?esc(has.map(x=>x.namaClient).join(', ')):''}">${d}</div>`;
  }
  const label = calCursor.toLocaleDateString('en-MY',{month:'long',year:'numeric'});

function badge(tone,text){
  const map = { success:['var(--successSoft)','var(--success)'], danger:['var(--dangerSoft)','var(--danger)'], gold:['var(--goldSoft)','var(--goldDeep)'], muted:['var(--surface)','var(--muted)'] };
  const [bg,fg] = map[tone]||map.muted;
  return `<span class="badge" style="background:${bg};color:${fg}">${esc(text)}</span>`;
}
const paymentTone = (s)=> s==='Paid'?'success':s==='Deposit Paid'?'gold':'danger';
const bookingTone = (s)=> s==='Confirmed'?'success':s==='Pending'?'gold':s==='Cancelled'?'danger':'muted';
const quoteTone = (s)=> s==='Accepted'?'success':s==='Sent'?'gold':s==='Rejected'?'danger':'muted';

/* ======================= EVENT WIRING ======================= */
function attachGlobalEvents(){
  $('btn-logout').onclick = () => { State.authed = false; render(); };
  document.querySelectorAll('[data-nav]').forEach(el => el.onclick = () => { State.view = el.dataset.nav; render(); });
  document.querySelectorAll('[data-cal]').forEach(el => el.onclick = () => {
    calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth()+Number(el.dataset.cal), 1); render();
  });

  // Bookings
  const btnNewB = $('btn-new-booking'); if(btnNewB) btnNewB.onclick = () => openForm('booking', {...emptyBooking(), _isNew:true});
  document.querySelectorAll('[data-edit]').forEach(el => el.onclick = () => {
    const b = State.bookings.find(x=>x.id===el.dataset.edit); openForm('booking', {...b});
  });
  document.querySelectorAll('[data-del]').forEach(el => el.onclick = () => {
    const b = State.bookings.find(x=>x.id===el.dataset.del);
    if(confirm(`Delete booking for ${b.namaClient}? This cannot be undone.`)){
      State.bookings = State.bookings.filter(x=>x.id!==b.id); persist('bookings'); showToast('Booking deleted.'); render();
    }
  });
  document.querySelectorAll('[data-sync]').forEach(el => el.onclick = () => {
    State.syncTarget = State.bookings.find(x=>x.id===el.dataset.sync); render();
  });
  const fq=$('f-q'), fd=$('f-date'), fp=$('f-pay');
  if(fq){ fq.oninput=()=>{bookingFilters.q=fq.value; renderPreserveScroll();}; }
  if(fd){ fd.onchange=()=>{bookingFilters.date=fd.value; render();}; }
  if(fp){ fp.onchange=()=>{bookingFilters.pay=fp.value; render();}; }
  const be=$('btn-export-excel'); if(be) be.onclick = exportBookingsExcel;
  const bp=$('btn-export-pdf'); if(bp) bp.onclick = exportBookingsListPDF;

  // Quotations
  const btnNewQ = $('btn-new-quotation'); if(btnNewQ) btnNewQ.onclick = () => openForm('quotation', {...emptyQuotation(), _isNew:true});
  document.querySelectorAll('[data-edit-q]').forEach(el => el.onclick = () => {
    const q = State.quotations.find(x=>x.id===el.dataset.editQ); openForm('quotation', {...q});
  });
  document.querySelectorAll('[data-del-q]').forEach(el => el.onclick = () => {
    if(confirm('Delete this quotation?')){ State.quotations = State.quotations.filter(x=>x.id!==el.dataset.delQ); persist('quotations'); render(); }
  });
  document.querySelectorAll('[data-convert]').forEach(el => el.onclick = () => {
    const q = State.quotations.find(x=>x.id===el.dataset.convert);
    const nb = { ...emptyBooking(), namaClient:q.namaClient, noHpClient:q.noHpClient, tarikhEvent:q.tarikhEvent,
      lokasiEvent:q.lokasiEvent, jenisEvent:q.jenisEvent, pakej:q.pakej, backdrop:q.backdrop,
      pakejTambahan:q.addOn||'N/A', transportCharges:q.transportCharges, jumlahKeseluruhan:quotationGrandTotal(q),
      bayaranDeposit:q.depositRequired, paymentStatus: num(q.depositRequired)>0?'Deposit Paid':'Unpaid',
      bookingStatus:'Pending', quotationRef:q.quotationNumber, _isNew:true };
    q.status='Accepted'; persist('quotations');
    openForm('booking', nb);
  });

  // Staff
  const btnNewS = $('btn-new-staff'); if(btnNewS) btnNewS.onclick = () => openForm('staff', {...emptyStaff(), _isNew:true});
  document.querySelectorAll('[data-edit-s]').forEach(el => el.onclick = () => {
    const s = State.staff.find(x=>x.id===el.dataset.editS); openForm('staff', {...s});
  });
  document.querySelectorAll('[data-del-s]').forEach(el => el.onclick = () => {
    if(confirm('Delete this staff allowance entry?')){ State.staff = State.staff.filter(x=>x.id!==el.dataset.delS); persist('staff'); render(); }
  });

  // Docs
  document.querySelectorAll('[data-doc]').forEach(el => el.onclick = () => {
    const [kind,id] = el.dataset.doc.split(':');
    const obj = kind==='booking' ? State.bookings.find(x=>x.id===id) : kind==='quotation' ? State.quotations.find(x=>x.id===id) : State.staff.find(x=>x.id===id);
    State.docModal = { kind, obj }; render();
  });

  // Modal (form)
  const bg = $('modal-bg');
  if(bg){
    $('modal-close').onclick = closeForm;
    $('modal-cancel').onclick = closeForm;
    bg.onclick = (e) => { if(e.target===bg) closeForm(); };
    $('entity-form').onsubmit = submitForm;
  }
  // Modal (doc)
  const dbg = $('doc-modal-bg');
  if(dbg){
    $('doc-modal-close').onclick = () => { State.docModal=null; render(); };
    dbg.onclick = (e) => { if(e.target===dbg){ State.docModal=null; render(); } };
    document.querySelectorAll('[data-pdf]').forEach(el => el.onclick = () => handlePdfAction(el.dataset.pdf));
  }
  // Modal (sync)
  const sbg = $('sync-modal-bg');
  if(sbg){
    $('sync-close').onclick = () => { State.syncTarget=null; render(); };
    sbg.onclick = (e) => { if(e.target===sbg){ State.syncTarget=null; render(); } };
    $('sync-open').onclick = () => {
      const start = $('sync-start').value, end = $('sync-end').value;
      const b = State.syncTarget;
      window.open(buildGCalUrl(b,start,end), '_blank', 'noopener,noreferrer');
      State.bookings = State.bookings.map(x=> x.id===b.id ? {...x, calendarSynced:true, waktuEvent: x.waktuEvent || `${start} - ${end}`} : x);
      persist('bookings'); State.syncTarget=null;
      showToast('Google Calendar tab opened — click Save on that page to finish syncing.');
      render();
    };
  }
}
function renderPreserveScroll(){ $('main').innerHTML = renderMain(); attachGlobalEvents(); }

function openForm(type, data){ State.formModal = { type, data }; render(); }
function closeForm(){ State.formModal = null; render(); }

function submitForm(e){
  e.preventDefault();
  const { type, data } = State.formModal;
  const meta = type==='booking'?BOOKING_FIELDS:type==='quotation'?QUOTATION_FIELDS:STAFF_FIELDS;
  const out = { ...data };
  meta.forEach(([key,label,t]) => { const el = $('ff-'+key); out[key] = t==='number' ? Number(el.value)||0 : el.value; });

  if(type==='booking'){
    out.paymentStatus = $('ff-paymentStatus').value; out.bookingStatus = $('ff-bookingStatus').value;
    if(!out.namaClient.trim() || !out.tarikhEvent){ showFormWarn('Nama Client and Tarikh Event are required.'); return; }
    const clash = State.bookings.some(x=> x.id!==out.id && x.bookingStatus!=='Cancelled' && x.tarikhEvent===out.tarikhEvent && out.waktuEvent.trim() && x.waktuEvent.trim().toLowerCase()===out.waktuEvent.trim().toLowerCase());
    if(clash){ showFormWarn('Double booking detected: another active booking already has this exact date and time.'); return; }
    const sameDate = State.bookings.some(x=> x.id!==out.id && x.bookingStatus!=='Cancelled' && x.tarikhEvent===out.tarikhEvent);
    const wasConfirmedBefore = State.bookings.find(x=>x.id===out.id)?.bookingStatus==='Confirmed';
    delete out._isNew;
    const exists = State.bookings.some(x=>x.id===out.id);
    State.bookings = exists ? State.bookings.map(x=>x.id===out.id?out:x) : [...State.bookings, out];
    persist('bookings'); State.formModal = null;
    showToast(sameDate ? 'Saved — note: another active booking already exists on this date.' : 'Booking saved.');
    if(out.bookingStatus==='Confirmed' && !out.calendarSynced && !wasConfirmedBefore){
      render(); setTimeout(()=>{ State.syncTarget = out; render(); }, 300); return;
    }
    render(); return;
  }

  if(type==='quotation'){
    out.status = $('ff-status').value;
    if(!out.namaClient.trim() || !out.tarikhEvent){ showFormWarn('Client Name and Event Date are required.'); return; }
    delete out._isNew;
    const exists = State.quotations.some(x=>x.id===out.id);
    State.quotations = exists ? State.quotations.map(x=>x.id===out.id?out:x) : [...State.quotations, out];
    persist('quotations'); State.formModal = null; showToast('Quotation saved.'); render(); return;
  }

  if(type==='staff'){
    out.paymentStatus = $('ff-paymentStatus').value; out.paymentDate = $('ff-paymentDate').value;
    if(!out.staffName.trim() || !out.eventDate){ showFormWarn('Staff Name and Event Date are required.'); return; }
    delete out._isNew;
    const exists = State.staff.some(x=>x.id===out.id);
    State.staff = exists ? State.staff.map(x=>x.id===out.id?out:x) : [...State.staff, out];
    persist('staff'); State.formModal = null; showToast('Staff allowance entry saved.'); render(); return;
  }
}
function showFormWarn(msg){ const w=$('form-warn'), t=$('form-warn-text'); w.style.display='flex'; t.textContent=msg; }

/* ======================= PDF ACTIONS ======================= */
function handlePdfAction(action){
  const [mode, docType] = action.split(':');
  const { kind, obj } = State.docModal;
  let doc, filename, waPhone, waName;
  if(kind==='booking'){
    if(docType==='Booking Summary'){ doc = buildBookingSummaryPDF(obj); filename = `booking-summary-${obj.namaClient}.pdf`; }
    else if(docType==='Invoice'){ doc = buildInvoicePDF(obj); filename = `invoice-${obj.namaClient}.pdf`; }
    else { doc = buildReceiptPDF(obj); filename = `receipt-${obj.namaClient}.pdf`; }
    waPhone = obj.noHpClient; waName = obj.namaClient;
  } else if(kind==='quotation'){
    doc = buildQuotationPDF(obj); filename = `quotation-${obj.quotationNumber}.pdf`; waPhone = obj.noHpClient; waName = obj.namaClient;
  } else {
    doc = buildStaffPDF(obj); filename = `staff-allowance-${obj.staffName}.pdf`; waPhone = obj.staffPhone; waName = obj.staffName;
  }
  filename = filename.replace(/[^a-z0-9.\- ]/gi,'').replace(/\s+/g,'-').toLowerCase();

  if(mode==='download'){ doc.save(filename); showToast('PDF downloaded.'); }
  else if(mode==='print'){ doc.autoPrint(); window.open(doc.output('bloburl'), '_blank'); }
  else if(mode==='wa'){
    doc.save(filename);
    window.open(waLink(waPhone, `Hi ${waName}, please find your ${docType} from Kerlip Photobooth attached (downloaded as ${filename}).`), '_blank');
    showToast('PDF downloaded — attach it in the WhatsApp chat that just opened.');
  } else if(mode==='mail'){
    doc.save(filename);
    const subject = encodeURIComponent(`Kerlip Photobooth — ${docType}`);
    const body = encodeURIComponent(`Hi ${waName},\n\nPlease find attached your ${docType} from Kerlip Photobooth (downloaded as ${filename}).\n\nThank you,\nKerlip Photobooth`);
    window.open(`mailto:?subject=${subject}&body=${body}`, '_blank');
    showToast('PDF downloaded — attach it to the email draft that just opened.');
  }
}

function exportBookingsExcel(){
  const rows = State.bookings.map(b => ({
    'Booking Date': b.bookingDate, 'Jenis Event': b.jenisEvent, 'Nama Client': b.namaClient, 'No HP Client': b.noHpClient,
    'Tarikh Event': b.tarikhEvent, 'Lokasi Event': b.lokasiEvent, 'Nama CP': b.namaCP, 'No HP CP': b.noHpCP,
    'Pakej': b.pakej, 'Backdrop': b.backdrop, 'Pakej Tambahan': b.pakejTambahan, 'Waktu Event': b.waktuEvent,
    'Transport (RM)': b.transportCharges, 'Jumlah (RM)': b.jumlahKeseluruhan, 'Deposit (RM)': b.bayaranDeposit,
    'Balance (RM)': num(b.jumlahKeseluruhan)-num(b.bayaranDeposit), 'Payment Status': b.paymentStatus,
    'Booking Status': b.bookingStatus, 'GCal Synced': b.calendarSynced?'Yes':'No',
  }));
  const ws = XLSX.utils.json_to_sheet(rows); const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Bookings'); XLSX.writeFile(wb, `kerlip-bookings-${todayISO()}.xlsx`);
  showToast('Excel file downloaded.');
}
function exportBookingsListPDF(){
  const doc = new window.jspdf.jsPDF({orientation:'landscape'});
  docHeader(doc,'Booking List','ALL-'+todayISO().replace(/-/g,''));
  doc.autoTable({ startY:30, theme:'grid', headStyles:{fillColor:[28,24,21],textColor:[239,228,196],fontSize:8},
    styles:{fontSize:8,cellPadding:2.5}, margin:{left:12,right:12},
    head:[['Event Date','Client','Phone','Location','Package','Total','Balance','Payment','Booking']],
    body: State.bookings.map(b=>[displayDate(b.tarikhEvent), b.namaClient, b.noHpClient, b.lokasiEvent, b.pakej,
      rmVal(b.jumlahKeseluruhan), rmVal(num(b.jumlahKeseluruhan)-num(b.bayaranDeposit)), b.paymentStatus, b.bookingStatus]),
  });
  doc.save(`kerlip-bookings-${todayISO()}.pdf`);
  showToast('PDF list downloaded.');
}
