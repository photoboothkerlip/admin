<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kerlip Photobooth — Admin Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --ink:#F8FAFC;
  --paper:#0B1626;
  --surface:#242B3D;
  --surfaceAlt:#111C2E;
  --line:rgba(148,163,184,.16);
  --gold:#8B5CF6;
  --goldDeep:#C084FC;
  --goldSoft:rgba(139,92,246,.18);
  --accent:#FF8A1F;
  --accentSoft:rgba(255,138,31,.16);
  --success:#2DD4BF;
  --successSoft:rgba(45,212,191,.13);
  --warning:#F59E0B;
  --warningSoft:rgba(245,158,11,.15);
  --danger:#FB7185;
  --dangerSoft:rgba(251,113,133,.14);
  --muted:#94A3B8;
  --shadow:0 22px 60px rgba(0,0,0,.28);
  --shadowHover:0 30px 90px rgba(0,0,0,.42);
  --glow:0 0 30px rgba(139,92,246,.28);
  --radius:28px;
  --radiusSm:16px;
  --headerH:72px;
  --sidebarW:260px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at 12% 10%,rgba(139,92,246,.24),transparent 28%),
    radial-gradient(circle at 84% 16%,rgba(255,138,31,.16),transparent 25%),
    linear-gradient(135deg,#283146 0%,#1F293D 40%,#111827 100%);
  color:var(--ink);
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}
.serif{font-family:'Playfair Display',serif;}
button{font-family:inherit;cursor:pointer;transition:all .2s cubic-bezier(.2,.8,.2,1);}
input,select,textarea{font-family:inherit;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{height:10px;width:10px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,.04);}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,.28);border-radius:999px;border:2px solid transparent;background-clip:padding-box;}
::-webkit-scrollbar-thumb:hover{background:rgba(139,92,246,.56);background-clip:padding-box;}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border-radius:999px;padding:11px 16px;font-size:13px;font-weight:750;
  border:1px solid rgba(148,163,184,.18);
  background:rgba(15,23,42,.72);color:var(--ink);white-space:nowrap;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 10px 24px rgba(0,0,0,.14);
  backdrop-filter:blur(18px);
}
.btn svg{filter:drop-shadow(0 0 10px rgba(139,92,246,.2));}
.btn:hover{background:rgba(30,41,59,.92);transform:translateY(-2px);box-shadow:var(--glow),0 16px 34px rgba(0,0,0,.28);border-color:rgba(139,92,246,.38);}
.btn-dark{background:linear-gradient(135deg,#7C3AED,#8B5CF6 55%,#A855F7);color:white;border:0;box-shadow:0 14px 34px rgba(139,92,246,.34);}
.btn-dark:hover{background:linear-gradient(135deg,#8B5CF6,#A855F7 55%,#C084FC);box-shadow:0 18px 48px rgba(139,92,246,.46);}
.btn-ghost{border:none;background:transparent;padding:9px;border-radius:14px;color:var(--muted);}
.btn-ghost:hover{background:rgba(139,92,246,.14);color:#fff;box-shadow:0 0 22px rgba(139,92,246,.18);}

/* Foundation */
.card{
  background:linear-gradient(180deg,rgba(15,23,42,.88),rgba(11,22,38,.88));
  border:1px solid rgba(148,163,184,.14);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
}
.badge{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:999px;font-size:11px;font-weight:850;letter-spacing:.01em;box-shadow:inset 0 1px 0 rgba(255,255,255,.05);}
.input{
  width:100%;border:1px solid rgba(148,163,184,.18);background:rgba(15,23,42,.72);color:var(--ink);
  border-radius:16px;padding:12px 14px;font-size:13px;outline:none;transition:all .18s ease;
}
.input::placeholder{color:rgba(148,163,184,.72);}
.input:focus{border-color:rgba(139,92,246,.7);box-shadow:0 0 0 4px rgba(139,92,246,.18),var(--glow);background:rgba(15,23,42,.95);}
select.input option{background:#0B1626;color:#fff;}
.label{font-size:10.5px;font-weight:850;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.07em;}
.field{display:flex;flex-direction:column;gap:2px;margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 18px;}

/* Layout */
.app-shell{min-height:100vh;display:grid;grid-template-columns:var(--sidebarW) minmax(0,1fr);}
.topbar{
  position:sticky;top:0;z-index:30;height:var(--headerH);display:flex;align-items:center;justify-content:space-between;padding:0 30px;
  background:rgba(11,22,38,.58);backdrop-filter:blur(22px);border-bottom:1px solid rgba(148,163,184,.13);
}
.sidebar{
  position:sticky;top:0;height:100vh;padding:24px 16px;background:rgba(7,17,31,.62);backdrop-filter:blur(24px);
  border-right:1px solid rgba(148,163,184,.13);display:flex;flex-direction:column;gap:20px;
}
.sidebar-brand{display:flex;align-items:center;gap:13px;padding:6px 10px 16px;}
.sidebar-brand svg{filter:drop-shadow(0 0 18px rgba(139,92,246,.32));}
.sidebar-brand-title{font-size:16px;font-weight:850;line-height:1.05;color:#fff;}
.sidebar-brand-sub{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:4px;}
.main-wrap{min-width:0;}
.content{width:100%;max-width:1760px;margin:0 auto;padding:28px 32px 44px;}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;}
.page-title{font-size:34px;line-height:1.05;font-weight:850;letter-spacing:-.055em;margin:0;color:#fff;text-shadow:0 10px 30px rgba(0,0,0,.28);}
.page-subtitle{font-size:13px;color:var(--muted);margin-top:7px;}
.global-search{display:flex;align-items:center;gap:10px;min-width:280px;max-width:460px;flex:1;background:rgba(7,17,31,.56);border:1px solid rgba(148,163,184,.16);border-radius:999px;padding:11px 15px;color:var(--muted);box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 10px 28px rgba(0,0,0,.18);backdrop-filter:blur(18px);}
.global-search input{border:0;outline:0;background:transparent;width:100%;font-size:13px;color:#fff;}

/* Navigation */
.nav-card{border:0;background:transparent;box-shadow:none;padding:0;display:flex;flex-direction:column;gap:7px;}
.navitem{position:relative;display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:999px;font-size:13px;font-weight:780;width:100%;text-align:left;border:none;background:transparent;color:var(--muted);}
.navitem svg{transition:all .2s ease;}
.navitem:hover{background:rgba(255,255,255,.055);color:#fff;transform:translateX(3px);}
.navitem:hover svg{filter:drop-shadow(0 0 12px rgba(139,92,246,.5));}
.navitem.active{background:linear-gradient(135deg,rgba(139,92,246,.24),rgba(11,22,38,.74));color:#fff;box-shadow:inset 4px 0 0 var(--gold),0 0 28px rgba(139,92,246,.15);}
.navitem.active svg{color:#C084FC;stroke:currentColor;filter:drop-shadow(0 0 14px rgba(139,92,246,.6));}

/* Login */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 18% 20%,rgba(139,92,246,.32),transparent 30%),radial-gradient(circle at 80% 18%,rgba(255,138,31,.18),transparent 25%),linear-gradient(135deg,#283146,#111827);padding:18px;}
.login-card{width:100%;max-width:430px;padding:36px;border-radius:34px;background:rgba(8,19,34,.66);backdrop-filter:blur(24px);border:1px solid rgba(148,163,184,.16);box-shadow:0 35px 110px rgba(0,0,0,.45),0 0 55px rgba(139,92,246,.12);}

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;}
.stat{
  position:relative;overflow:hidden;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:130px;
  background:linear-gradient(145deg,rgba(15,23,42,.92) 0%,rgba(11,22,38,.92) 55%,rgba(55,48,163,.34) 100%);
  transition:all .22s ease;border-color:rgba(148,163,184,.13);
}
.stat:hover{transform:translateY(-5px) scale(1.01);box-shadow:var(--shadowHover),0 0 35px rgba(139,92,246,.17);border-color:rgba(139,92,246,.28);}
.stat:after{content:'';position:absolute;right:-42px;top:-42px;width:118px;height:118px;border-radius:999px;background:radial-gradient(circle,rgba(139,92,246,.32),transparent 70%);}
.stat .top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;}
.stat .val{font-family:'Inter',sans-serif;font-size:29px;font-weight:880;letter-spacing:-.055em;position:relative;z-index:1;color:#fff;}
.iconwrap{width:40px;height:40px;border-radius:16px;background:linear-gradient(135deg,rgba(139,92,246,.24),rgba(45,212,191,.12));color:#C084FC;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(139,92,246,.16);}
.section-kicker{font-size:12px;font-weight:850;color:#C084FC;text-transform:uppercase;letter-spacing:.09em;margin:8px 0 -2px;}

/* Tables */
.table-card{overflow:hidden;border-radius:28px;box-shadow:var(--shadow);}
.table-scroll{overflow:auto;max-width:100%;}
table{width:100%;min-width:1180px;border-collapse:separate;border-spacing:0;font-size:13.5px;table-layout:auto;}
th{position:sticky;top:0;z-index:2;text-align:left;padding:16px 19px;font-size:10.5px;font-weight:850;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);background:rgba(15,23,42,.96);white-space:nowrap;border-bottom:1px solid rgba(148,163,184,.14);}
td{padding:18px 19px;border-top:1px solid rgba(148,163,184,.10);white-space:nowrap;background:rgba(11,22,38,.78);vertical-align:middle;color:#E5E7EB;}
tbody tr:nth-child(even) td{background:rgba(15,23,42,.78);}
tbody tr:hover td{background:rgba(139,92,246,.10);}
td:first-child,th:first-child{padding-left:24px;}
td:last-child,th:last-child{padding-right:24px;}

/* Modals / Drawer */
.modal-bg{position:fixed;inset:0;background:rgba(2,6,23,.58);display:flex;align-items:stretch;justify-content:flex-end;padding:0;overflow-y:auto;z-index:60;animation:fadeIn .18s ease;backdrop-filter:blur(10px);}
.modal{background:linear-gradient(180deg,#0B1626,#07111F);border-left:1px solid rgba(148,163,184,.16);border-radius:30px 0 0 30px;width:100%;max-width:780px;min-height:100vh;margin:0;box-shadow:-35px 0 100px rgba(0,0,0,.46);animation:slideIn .24s ease;color:#fff;}
.dochelp{font-size:12px;color:var(--muted);line-height:1.55;margin-top:12px;background:rgba(15,23,42,.9);padding:13px 15px;border-radius:18px;border:1px solid rgba(148,163,184,.12);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7C3AED,#8B5CF6);color:white;padding:13px 20px;border-radius:999px;font-size:13px;font-weight:750;z-index:100;box-shadow:0 20px 50px rgba(139,92,246,.34);animation:toastIn .2s ease;}

/* Calendar */
.calendar-card{padding:22px;}
.calendar-day{aspect-ratio:1;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;transition:all .16s ease;}
.calendar-day:hover{background:rgba(139,92,246,.12);box-shadow:0 0 22px rgba(139,92,246,.14);}

/* Utility colour patches */
[style*="background:var(--surface)"]{background:rgba(15,23,42,.72)!important;}
[style*="background:var(--surfaceAlt)"]{background:rgba(15,23,42,.68)!important;}
[style*="background:#fff"],[style*="background: #fff"]{background:rgba(15,23,42,.72)!important;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(30px);opacity:.4}to{transform:translateX(0);opacity:1}}
@keyframes toastIn{from{transform:translate(-50%,8px);opacity:0}to{transform:translate(-50%,0);opacity:1}}

/* Mobile */
@media(max-width:980px){
  .app-shell{display:block;}
  .sidebar{position:relative;height:auto;border-right:0;border-bottom:1px solid rgba(148,163,184,.13);padding:12px;}
  .sidebar-brand{padding-bottom:8px;}
  .nav-card{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
  .content{padding:18px 14px 32px;}
  .topbar{padding:0 14px;}
  .global-search{display:none;}
  .page-head{display:block;}
  .page-title{font-size:28px;}
  .grid2{grid-template-columns:1fr;}
  .modal{border-radius:26px 26px 0 0;max-width:100%;min-height:auto;margin-top:40px;}
  .modal-bg{align-items:flex-end;}
}
@media(max-width:640px){
  .nav-card{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:1fr;}
  table{min-width:900px;}
}


/* ======================= THEME TOGGLE: LIGHT / DARK ======================= */
.theme-toggle{
  min-width:116px;
  position:relative;
  overflow:hidden;
}
.theme-toggle .theme-icon{font-size:15px;line-height:1;filter:drop-shadow(0 0 10px rgba(139,92,246,.45));}
.theme-toggle .theme-label{font-size:12px;font-weight:850;}

body.light{
  --ink:#2F241F;
  --paper:#FFFDF9;
  --surface:#F5F0EA;
  --surfaceAlt:#FFF7F1;
  --line:rgba(91,51,36,.12);
  --gold:#FF6B1A;
  --goldDeep:#5B3324;
  --goldSoft:rgba(255,107,26,.13);
  --accent:#C86B42;
  --accentSoft:rgba(200,107,66,.13);
  --success:#1F8A5B;
  --successSoft:#EAF7F0;
  --warning:#B7791F;
  --warningSoft:#FFF6DE;
  --danger:#C2412D;
  --dangerSoft:#FFF0EC;
  --muted:#8B7668;
  --shadow:0 18px 45px rgba(91,51,36,.08);
  --shadowHover:0 24px 70px rgba(91,51,36,.15);
  --glow:0 0 0 4px rgba(255,107,26,.11);
  background:
    radial-gradient(circle at 14% 9%,rgba(255,107,26,.12),transparent 28%),
    radial-gradient(circle at 88% 14%,rgba(91,51,36,.10),transparent 25%),
    linear-gradient(135deg,#F7F1EA 0%,#FBF5EE 48%,#EFE3D7 100%);
  color:var(--ink);
}
body.light .topbar{
  background:rgba(255,253,249,.84);
  border-bottom:1px solid rgba(91,51,36,.10);
  box-shadow:0 12px 32px rgba(91,51,36,.06);
}
body.light .sidebar{
  background:rgba(255,253,249,.84);
  border-right:1px solid rgba(91,51,36,.10);
  box-shadow:18px 0 45px rgba(91,51,36,.05);
}
body.light .sidebar-brand-title,
body.light .page-title{color:#2F241F;text-shadow:none;}
body.light .sidebar-brand-sub,
body.light .page-subtitle{color:#8B7668;}
body.light .card{
  background:rgba(255,253,249,.92);
  border:1px solid rgba(91,51,36,.10);
  box-shadow:var(--shadow);
}
body.light .stat{
  background:
    linear-gradient(145deg,rgba(255,253,249,.98) 0%,rgba(255,247,241,.96) 58%,rgba(255,107,26,.10) 100%);
  border-color:rgba(91,51,36,.10);
}
body.light .stat:after{background:radial-gradient(circle,rgba(255,107,26,.18),transparent 70%);}
body.light .stat:hover{border-color:rgba(255,107,26,.30);box-shadow:var(--shadowHover),0 0 0 4px rgba(255,107,26,.06);}
body.light .stat .val{color:#2F241F;text-shadow:none;}
body.light .section-kicker{color:#5B3324;}
body.light .btn{
  background:rgba(255,253,249,.9);
  color:#2F241F;
  border:1px solid rgba(91,51,36,.13);
  box-shadow:0 10px 22px rgba(91,51,36,.06),inset 0 1px 0 rgba(255,255,255,.95);
}
body.light .btn:hover{
  background:#FFFFFF;
  border-color:rgba(255,107,26,.38);
  box-shadow:0 16px 34px rgba(91,51,36,.10),0 0 0 4px rgba(255,107,26,.09);
}
body.light .btn-dark{
  background:linear-gradient(135deg,#5B3324,#6B3F2E 58%,#FF6B1A);
  color:#fff;
  border:0;
  box-shadow:0 16px 34px rgba(91,51,36,.20);
}
body.light .btn-dark:hover{box-shadow:0 20px 46px rgba(255,107,26,.24);}
body.light .btn-ghost{color:#8B7668;}
body.light .btn-ghost:hover{background:rgba(255,107,26,.11);color:#FF6B1A;}
body.light .input,
body.light .global-search{
  background:rgba(255,253,249,.9);
  color:#2F241F;
  border:1px solid rgba(91,51,36,.12);
  box-shadow:0 10px 22px rgba(91,51,36,.04),inset 0 1px 0 rgba(255,255,255,.9);
}
body.light .global-search input{color:#2F241F;}
body.light .input::placeholder{color:#B29B8B;}
body.light .input:focus{border-color:rgba(255,107,26,.58);box-shadow:0 0 0 4px rgba(255,107,26,.12),0 12px 26px rgba(91,51,36,.07);background:#fff;}
body.light select.input option{background:#FFFFFF;color:#2F241F;}
body.light th{
  background:#F1E7DD;
  color:#8B7668;
  border-bottom:1px solid rgba(91,51,36,.10);
}
body.light td{
  background:#FFFDF9;
  color:#2F241F;
  border-top:1px solid rgba(91,51,36,.08);
}
body.light tbody tr:nth-child(even) td{background:#FFF7F1;}
body.light tbody tr:hover td{background:#FCEBDD;}
body.light .table-wrap,
body.light .card[style*="overflow-x:auto"]{background:rgba(255,253,249,.92);}
body.light .navitem{color:#6E5A4D;}
body.light .navitem:hover{background:rgba(255,107,26,.10);color:#5B3324;}
body.light .navitem.active{
  background:linear-gradient(90deg,rgba(255,107,26,.15),rgba(255,253,249,.9));
  color:#5B3324;
  box-shadow:inset 4px 0 0 #FF6B1A,0 12px 28px rgba(91,51,36,.05);
}
body.light .navitem.active svg{color:#FF6B1A;filter:drop-shadow(0 0 10px rgba(255,107,26,.25));}
body.light .modal-bg{background:rgba(91,51,36,.28);}
body.light .modal{
  background:rgba(255,253,249,.98);
  color:#2F241F;
  border:1px solid rgba(91,51,36,.10);
  box-shadow:0 30px 90px rgba(91,51,36,.22);
}
body.light .toast{
  background:linear-gradient(135deg,#5B3324,#FF6B1A);
  color:#fff;
  box-shadow:0 18px 45px rgba(91,51,36,.22);
}
body.light .dochelp{background:#FFF7F1;color:#8B7668;border:1px solid rgba(91,51,36,.08);}
body.light .iconwrap{background:rgba(255,107,26,.13);color:#FF6B1A;}
body.light .badge{box-shadow:inset 0 1px 0 rgba(255,255,255,.8);}
body.light .login-bg{background:linear-gradient(135deg,#F7F1EA,#EFE3D7);}
body.light .login-card{background:rgba(255,253,249,.9);border:1px solid rgba(91,51,36,.10);box-shadow:0 35px 90px rgba(91,51,36,.16);}
body.light ::-webkit-scrollbar-track{background:rgba(91,51,36,.04);}
body.light ::-webkit-scrollbar-thumb{background:rgba(91,51,36,.18);border:2px solid transparent;background-clip:padding-box;}
body.light ::-webkit-scrollbar-thumb:hover{background:rgba(255,107,26,.52);background-clip:padding-box;}
@media(max-width:820px){.theme-toggle{min-width:auto}.theme-toggle .theme-label{display:none}}



/* ======================= PREMIUM UPCOMING EVENTS ======================= */
.upcoming-panel{
  padding:22px;
  overflow:hidden;
}
.upcoming-head{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
  font-size:15px;
  font-weight:850;
  letter-spacing:-.02em;
}
.upcoming-head svg{color:var(--gold);filter:drop-shadow(0 0 12px rgba(139,92,246,.35));}
.upcoming-list{display:flex;flex-direction:column;gap:14px;}
.upcoming-empty{
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,.06);
  color:var(--muted);
  border:1px solid var(--line);
  font-size:13px;
}
.upcoming-card{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:20px 22px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(135deg,rgba(13,24,43,.96),rgba(17,28,49,.90));
  box-shadow:0 18px 45px rgba(0,0,0,.18);
  overflow:hidden;
  transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
}
.upcoming-card:before{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;
  width:6px;
  background:var(--event-accent);
  box-shadow:0 0 30px var(--event-glow);
}
.upcoming-card:after{
  content:"";
  position:absolute;
  inset:-40% -20% auto auto;
  width:200px;height:200px;
  background:radial-gradient(circle,var(--event-glow),transparent 68%);
  opacity:.65;
  pointer-events:none;
}
.upcoming-card:hover{transform:translateY(-2px);box-shadow:0 24px 60px rgba(0,0,0,.25);border-color:var(--event-border);}

const parseTimeRange = (text) => {
  if(!text) return {start:'',end:''};
  const m = text.match(/(\d{1,2})[:.](\d{2})\s*(am|pm)?\s*-\s*(\d{1,2})[:.](\d{2})\s*(am|pm)?/i);
  if(!m) return {start:'',end:''};
  const to24=(h,mi,ap)=>{h=parseInt(h,10); if(ap){const p=ap.toLowerCase()==='pm'; if(p&&h!==12)h+=12; if(!p&&h===12)h=0;} return `${String(h).padStart(2,'0')}:${mi}`;};
  return {start:to24(m[1],m[2],m[3]), end:to24(m[4],m[5],m[6]||m[3])};
};

async function loadAll(){
  try{
    const snap = await getDoc(appDataRef);
    if(snap.exists()){
      const data = snap.data();
      State.bookings = Array.isArray(data.bookings) ? data.bookings : [];
      State.quotations = Array.isArray(data.quotations) ? data.quotations : [];
      State.staff = Array.isArray(data.staff) ? data.staff : [];
      State.expenses = Array.isArray(data.expenses) ? data.expenses : [];
    } else {
      State.bookings = [sampleBooking()];
      State.quotations = [];
      State.staff = [];
      State.expenses = [];
      await setDoc(appDataRef, {
        bookings: State.bookings,
        quotations: State.quotations,
        staff: State.staff,
        expenses: State.expenses,
        updatedAt: new Date().toISOString()
      });
    }
  }catch(e){
    console.error("Firebase load failed:", e);
    State.bookings = [sampleBooking()];
    State.quotations = [];
    State.staff = [];
    State.expenses = [];
    showToast("Firebase load failed. Check Firestore rules.");
  }
  State.loading = false;
}

async function persist(key){
  try{

      bookings: State.bookings,
      quotations: State.quotations,
      staff: State.staff,
      expenses: State.expenses,

  }
}

  if(s.includes('guest book')) return 'Guest book add-on';
  return 'Other income';
}

function buildGCalUrl(b, start, end){
  const title = `Kerlip Photobooth - ${b.namaClient} - ${b.jenisEvent||'Event'}`;
  const details = [
    `Client: ${b.namaClient}`, `Phone: ${b.noHpClient}`, `Location: ${b.lokasiEvent}`,
    `Package: ${b.pakej}`, `Backdrop: ${b.backdrop||'N/A'}`, `Add-on: ${b.pakejTambahan||'N/A'}`,
    `Total: ${rm(b.jumlahKeseluruhan)}`, `Deposit Paid: ${rm(b.bayaranDeposit)}`,
    `Balance: ${rm(b.jumlahKeseluruhan-b.bayaranDeposit)}`, `Payment Status: ${b.paymentStatus}`,
    `Contact Person (event day): ${b.namaCP||'—'}`, `Contact Person Phone: ${b.noHpCP||'—'}`,
  ].join('\n');
  const dc = b.tarikhEvent.replace(/-/g,'');
  const dates = `${dc}T${start.replace(':','')}00/${dc}T${end.replace(':','')}00`;
  const params = new URLSearchParams({action:'TEMPLATE',text:title,dates,details,location:b.lokasiEvent||'',ctz:'Asia/Kuala_Lumpur'});
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}

/* ======================= DASHBOARD ======================= */
function statCard(icon,label,val,sub,bg){
  return `<div class="card stat"><div class="top"><span style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">${label}</span>
    <div class="iconwrap" style="${bg?`background:${bg}`:''}">${icon}</div></div>
    <div class="val">${val}</div>${sub?`<div style="font-size:11px;color:var(--muted)">${sub}</div>`:''}</div>`;
}

function eventToneClass(b){
  const txt = `${b.jenisEvent||''} ${b.pakej||''} ${b.lokasiEvent||''}`.toLowerCase();
  if(txt.includes('wedding')) return 'event-gold';
  if(txt.includes('hospital') || txt.includes('medical') || txt.includes('ppum') || txt.includes('ummc')) return 'event-orange';
  if(txt.includes('corporate') || txt.includes('company') || txt.includes('faazmiar')) return 'event-green';
  if(txt.includes('convocation') || txt.includes('school') || txt.includes('university')) return 'event-blue';
  return 'event-purple';
}
function eventIconSvg(b){
  const txt = `${b.jenisEvent||''} ${b.pakej||''} ${b.lokasiEvent||''}`.toLowerCase();
  if(txt.includes('wedding')) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8.5 8.5a5 5 0 1 0 7 7"/><path d="M15.5 8.5a5 5 0 1 1-7 7"/><path d="M8 3h8l-4 5-4-5Z"/></svg>`;
  if(txt.includes('hospital') || txt.includes('medical') || txt.includes('ppum') || txt.includes('ummc')) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-6h6v6"/><path d="M12 7v5"/><path d="M9.5 9.5h5"/></svg>`;
  if(txt.includes('convocation') || txt.includes('school') || txt.includes('university')) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m22 10-10-5-10 5 10 5 10-5Z"/><path d="M6 12v5c3 2 9 2 12 0v-5"/></svg>`;
  if(txt.includes('corporate') || txt.includes('company') || txt.includes('faazmiar')) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 6V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1"/><path d="M3 8h18v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8Z"/><path d="M3 13h18"/></svg>`;
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
}
function eventDateIcon(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 2v4M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="4"/><path d="M3 10h18"/></svg>`; }
function eventPinIcon(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`; }
function eventCheckIcon(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="m8 12 2.5 2.5L16 9"/></svg>`; }

function renderDashboard(){
  const b = State.bookings, s = State.staff;
  const mk = todayISO().slice(0,7);
  const total=b.length, confirmed=b.filter(x=>x.bookingStatus==='Confirmed').length, pending=b.filter(x=>x.bookingStatus==='Pending').length;
  const paid=b.filter(x=>x.paymentStatus==='Paid').length, unpaid=b.filter(x=>x.paymentStatus==='Unpaid').length;
  const monthlyRevenue = b.filter(x=>monthKeyOf(x.tarikhEvent)===mk && x.bookingStatus!=='Cancelled').reduce((s,x)=>s+num(x.jumlahKeseluruhan),0);
  const staffThisMonth = s.filter(x=>monthKeyOf(x.eventDate)===mk);
  const staffTotalMonth = staffThisMonth.reduce((s,x)=>s+staffTotal(x),0);
  const staffPaid = staffThisMonth.filter(x=>x.paymentStatus==='Paid').reduce((s,x)=>s+staffTotal(x),0);
  const staffPending = staffTotalMonth - staffPaid;
  const netProfit = monthlyRevenue - staffTotalMonth;
  const upcoming = b.filter(x=>x.tarikhEvent>=todayISO() && x.bookingStatus!=='Cancelled').sort((a,c)=>a.tarikhEvent.localeCompare(c.tarikhEvent)).slice(0,6);

  return `
  <div style="display:flex;flex-direction:column;gap:18px">
    <div class="kpi-grid">
      ${statCard(I.list,'Total Bookings',total)}
      ${statCard(`<span style="color:var(--success)">✓</span>`,'Confirmed',confirmed)}
      ${statCard(`<span style="color:var(--goldDeep)">⏱</span>`,'Pending',pending)}
      ${statCard(`<span>${rm(0)==='N/A'?'':''}RM</span>`,'Paid',paid)}
      ${statCard(I.alert,'Unpaid',unpaid,'','var(--dangerSoft)')}
      ${statCard('RM','Monthly Revenue',rm(monthlyRevenue),'Active bookings this month')}
    </div>
    <div class="serif" style="font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--goldDeep);text-transform:uppercase;margin-top:4px">Crew &amp; Profit</div>
    <div class="kpi-grid">
      ${statCard(I.users,'Staff Allowance (Month)',rm(staffTotalMonth))}
      ${statCard('✓','Paid Allowance',rm(staffPaid))}
      ${statCard(I.alert,'Pending Allowance',rm(staffPending),'','var(--dangerSoft)')}
      ${statCard('RM','Net Profit',rm(netProfit),'Revenue minus staff allowance')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px" class="dgrid">
      <div class="card upcoming-panel">
        <div class="upcoming-head">${I.users} Upcoming Events</div>
        <div class="upcoming-list">
        ${upcoming.length===0?`<div class="upcoming-empty">No upcoming events.</div>`:
          upcoming.map(x=>`<div class="upcoming-card ${eventToneClass(x)}">
            <div class="event-left">
              <div class="event-icon">${eventIconSvg(x)}</div>
              <div class="event-copy">
                <div class="event-title">${esc(x.namaClient)} — ${esc(x.jenisEvent||'Event')}</div>
                <div class="event-meta">${eventDateIcon()} <span>${displayDate(x.tarikhEvent)}</span> <span class="event-dot">•</span> ${eventPinIcon()} <span>${esc(x.lokasiEvent||'Location TBC')}</span></div>
              </div>
            </div>
            <div class="event-status">${eventCheckIcon()} ${esc(x.bookingStatus)}</div>
          </div>`).join('')}
        </div>
      </div>
      ${renderMiniCalendar()}
    </div>
  </div>
  <style>@media(max-width:900px){.dgrid{grid-template-columns:1fr !important}}

let calCursor = new Date();
function renderMiniCalendar(){
  const y = calCursor.getFullYear(), m = calCursor.getMonth();
  const first = new Date(y,m,1), startWd = first.getDay(), days = new Date(y,m+1,0).getDate();
  const byDate = {};
  State.bookings.forEach(b=>{ if(b.tarikhEvent){ (byDate[b.tarikhEvent]=byDate[b.tarikhEvent]||[]).push(b);} });
  let cells = ''; for(let i=0;i<startWd;i++) cells+='<div></div>';
  for(let d=1; d<=days; d++){
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has = byDate[iso]; const isToday = iso===todayISO();
    cells += `<div class="calendar-day" style="
      background:${has?'var(--goldSoft)':'transparent'};border:${isToday?'1.5px solid var(--gold)':'1px solid transparent'};
      color:${has?'var(--goldDeep)':'var(--ink)'};font-weight:${has?'700':'400'}" title="${has?esc(has.map(x=>x.namaClient).join(', ')):''}">${d}</div>`;
  }
  const label = calCursor.toLocaleDateString('en-MY',{month:'long',year:'numeric'});
  return `<div class="card calendar-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px">${I.dash} ${label}</div>
      <div style="display:flex;gap:4px"><button class="btn-ghost" data-cal="-1">${I.chevL}</button><button class="btn-ghost" data-cal="1">${I.chevR}</button></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:10.5px;color:var(--muted);text-align:center;margin-bottom:4px">
      <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cells}</div>
  </div>`;
}

function badge(tone,text){
  const map = { success:['var(--successSoft)','var(--success)'], danger:['var(--dangerSoft)','var(--danger)'], gold:['var(--goldSoft)','var(--goldDeep)'], muted:['var(--surface)','var(--muted)'] };
  const [bg,fg] = map[tone]||map.muted;
  return `<span class="badge" style="background:${bg};color:${fg}">${esc(text)}</span>`;
}
const paymentTone = (s)=> s==='Paid'?'success':s==='Deposit Paid'?'gold':'danger';
const bookingTone = (s)=> s==='Confirmed'?'success':s==='Pending'?'gold':s==='Cancelled'?'danger':'muted';
const quoteTone = (s)=> s==='Accepted'?'success':s==='Sent'?'gold':s==='Rejected'?'danger':'muted';

/* ======================= ACCOUNT STATEMENT: ENGINE ======================= */
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function zeros(){ return Array(12).fill(0); }
function computeAccountStatement(year){
  const revByCat = {}; REVENUE_CATEGORIES.forEach(c=>revByCat[c]=zeros());
  const opexByCat = {}; OPEX_CATEGORIES.forEach(c=>opexByCat[c]=zeros());
  const capexByMonth = zeros();

  State.bookings.forEach(b=>{
    if(b.bookingStatus==='Cancelled') return;
    if(!b.tarikhEvent || b.tarikhEvent.slice(0,4)!==year) return;
    const m = Number(b.tarikhEvent.slice(5,7))-1; if(m<0||m>11) return;
    const cat = REVENUE_CATEGORIES.includes(b.revenueCategory) ? b.revenueCategory : guessRevenueCategory(b);
    revByCat[cat][m] += num(b.jumlahKeseluruhan);
  });

  State.staff.forEach(s=>{
    if(!s.eventDate || s.eventDate.slice(0,4)!==year) return;
    const m = Number(s.eventDate.slice(5,7))-1; if(m<0||m>11) return;
    opexByCat['Manpower / assistant salary'][m] += staffTotal(s);
  });

  State.expenses.forEach(e=>{
    if(!e.date || e.date.slice(0,4)!==year) return;
    const m = Number(e.date.slice(5,7))-1; if(m<0||m>11) return;
    if(e.type==='CAPEX'){ capexByMonth[m] += num(e.amount); return; }
    const cat = OPEX_CATEGORIES.includes(e.category) ? e.category : 'Miscellaneous expenses';
    opexByCat[cat][m] += num(e.amount);
  });

  const revTotal = zeros(), opexTotal = zeros();
  for(let m=0;m<12;m++){
    REVENUE_CATEGORIES.forEach(c=> revTotal[m]+=revByCat[c][m]);
    OPEX_CATEGORIES.forEach(c=> opexTotal[m]+=opexByCat[c][m]);
  }
  const netProfit = revTotal.map((v,m)=> v - opexTotal[m]);

  const opening = zeros(), inflow = revTotal, outflow = zeros(), netCash = zeros(), closing = zeros();
  let running = 0;
  for(let m=0;m<12;m++){
    opening[m] = running;
    outflow[m] = opexTotal[m] + capexByMonth[m];
    netCash[m] = inflow[m] - outflow[m];
    closing[m] = opening[m] + netCash[m];
    running = closing[m];
  }

  const sum = arr => arr.reduce((a,b)=>a+b,0);
  const totalRevenue = sum(revTotal), totalOpex = sum(opexTotal), totalCapex = sum(capexByMonth);
  const grossProfit = totalRevenue - totalOpex;
  const netProfitYear = grossProfit; // no COGS/tax distinction in this simplified statement
  const profitMargin = totalRevenue ? netProfitYear/totalRevenue : 0;

  return { year, revByCat, opexByCat, capexByMonth, revTotal, opexTotal, netProfit,
    opening, inflow, outflow, netCash, closing,
    totalRevenue, totalOpex, totalCapex, grossProfit, netProfitYear, profitMargin,
    closingCashBalance: closing[11] };
}
function accountYears(){
  const ys = new Set(['2026']);
  State.bookings.forEach(b=>{ if(b.tarikhEvent) ys.add(b.tarikhEvent.slice(0,4)); });
  State.expenses.forEach(e=>{ if(e.date) ys.add(e.date.slice(0,4)); });
  State.staff.forEach(s=>{ if(s.eventDate) ys.add(s.eventDate.slice(0,4)); });
  return [...ys].sort();
}

  document.querySelectorAll('[data-convert]').forEach(el => el.onclick = () => {
    const q = State.quotations.find(x=>x.id===el.dataset.convert);
    const nb = { ...emptyBooking(), namaClient:q.namaClient, noHpClient:q.noHpClient, tarikhEvent:q.tarikhEvent,
      lokasiEvent:q.lokasiEvent, jenisEvent:q.jenisEvent, pakej:q.pakej, backdrop:q.backdrop,
      pakejTambahan:q.addOn||'N/A', transportCharges:q.transportCharges, jumlahKeseluruhan:quotationGrandTotal(q),
      bayaranDeposit:q.depositRequired, paymentStatus: num(q.depositRequired)>0?'Deposit Paid':'Unpaid',
      bookingStatus:'Pending', quotationRef:q.quotationNumber, _isNew:true };
    q.status='Accepted'; persist('quotations');
    openForm('booking', nb);
  });

  // Staff
  const btnNewS = $('btn-new-staff'); if(btnNewS) btnNewS.onclick = () => openForm('staff', {...emptyStaff(), _isNew:true});
  document.querySelectorAll('[data-edit-s]').forEach(el => el.onclick = () => {
    const s = State.staff.find(x=>x.id===el.dataset.editS); openForm('staff', {...s});
  });
  document.querySelectorAll('[data-del-s]').forEach(el => el.onclick = () => {
    if(confirm('Delete this staff allowance entry?')){ State.staff = State.staff.filter(x=>x.id!==el.dataset.delS); persist('staff'); render(); }
  });

  // Account Statement
  const accYear = $('acc-year'); if(accYear) accYear.onchange = () => { State.accountsYear = accYear.value; render(); };
  const btnNewE = $('btn-new-expense'); if(btnNewE) btnNewE.onclick = () => openForm('expense', {...emptyExpense(), _isNew:true});
  document.querySelectorAll('[data-edit-e]').forEach(el => el.onclick = () => {
    const e2 = State.expenses.find(x=>x.id===el.dataset.editE); openForm('expense', {...e2});
  });
  document.querySelectorAll('[data-del-e]').forEach(el => el.onclick = () => {
    if(confirm('Delete this expense / CAPEX entry?')){ State.expenses = State.expenses.filter(x=>x.id!==el.dataset.delE); persist('expenses'); showToast('Expense deleted.'); render(); }
  });
  const btnAccExcel = $('btn-acc-excel'); if(btnAccExcel) btnAccExcel.onclick = () => exportAccountsExcel(State.accountsYear);
  const btnAccPdf = $('btn-acc-pdf'); if(btnAccPdf) btnAccPdf.onclick = () => exportAccountsPDF(State.accountsYear);

  // Docs
  document.querySelectorAll('[data-doc]').forEach(el => el.onclick = () => {
    const [kind,id] = el.dataset.doc.split(':');
    const obj = kind==='booking' ? State.bookings.find(x=>x.id===id) : kind==='quotation' ? State.quotations.find(x=>x.id===id) : State.staff.find(x=>x.id===id);
    State.docModal = { kind, obj }; render();
  });

  // Modal (form)
  const bg = $('modal-bg');
  if(bg){
    $('modal-close').onclick = closeForm;
    $('modal-cancel').onclick = closeForm;
    bg.onclick = (e) => { if(e.target===bg) closeForm(); };
    $('entity-form').onsubmit = submitForm;
  }
  // Modal (doc)
  const dbg = $('doc-modal-bg');
  if(dbg){
    $('doc-modal-close').onclick = () => { State.docModal=null; render(); };
    dbg.onclick = (e) => { if(e.target===dbg){ State.docModal=null; render(); } };
    document.querySelectorAll('[data-pdf]').forEach(el => el.onclick = () => handlePdfAction(el.dataset.pdf));
  }
  // Modal (sync)
  const sbg = $('sync-modal-bg');
  if(sbg){
    $('sync-close').onclick = () => { State.syncTarget=null; render(); };
    sbg.onclick = (e) => { if(e.target===sbg){ State.syncTarget=null; render(); } };
    $('sync-open').onclick = () => {
      const start = $('sync-start').value, end = $('sync-end').value;
      const b = State.syncTarget;
      window.open(buildGCalUrl(b,start,end), '_blank', 'noopener,noreferrer');
      State.bookings = State.bookings.map(x=> x.id===b.id ? {...x, calendarSynced:true, waktuEvent: x.waktuEvent || `${start} - ${end}`} : x);
      persist('bookings'); State.syncTarget=null;
      showToast('Google Calendar tab opened — click Save on that page to finish syncing.');
      render();
    };
  }
}
function renderPreserveScroll(){ $('main').innerHTML = renderMain(); attachGlobalEvents(); }

function openForm(type, data){ State.formModal = { type, data }; render(); }
function closeForm(){ State.formModal = null; render(); }

function submitForm(e){
  e.preventDefault();
  const { type, data } = State.formModal;
  const meta = type==='booking'?BOOKING_FIELDS:type==='quotation'?QUOTATION_FIELDS:type==='staff'?STAFF_FIELDS:EXPENSE_FIELDS;
  const out = { ...data };
  meta.forEach(([key,label,t]) => { const el = $('ff-'+key); out[key] = t==='number' ? Number(el.value)||0 : el.value; });

  if(type==='booking'){
    out.paymentStatus = $('ff-paymentStatus').value; out.bookingStatus = $('ff-bookingStatus').value;
    if(!out.namaClient.trim() || !out.tarikhEvent){ showFormWarn('Nama Client and Tarikh Event are required.'); return; }
    const clash = State.bookings.some(x=> x.id!==out.id && x.bookingStatus!=='Cancelled' && x.tarikhEvent===out.tarikhEvent && out.waktuEvent.trim() && x.waktuEvent.trim().toLowerCase()===out.waktuEvent.trim().toLowerCase());
    if(clash){ showFormWarn('Double booking detected: another active booking already has this exact date and time.'); return; }
    const sameDate = State.bookings.some(x=> x.id!==out.id && x.bookingStatus!=='Cancelled' && x.tarikhEvent===out.tarikhEvent);
    const wasConfirmedBefore = State.bookings.find(x=>x.id===out.id)?.bookingStatus==='Confirmed';
    delete out._isNew;
    const exists = State.bookings.some(x=>x.id===out.id);
    State.bookings = exists ? State.bookings.map(x=>x.id===out.id?out:x) : [...State.bookings, out];
    persist('bookings'); State.formModal = null;
    showToast(sameDate ? 'Saved — note: another active booking already exists on this date.' : 'Booking saved.');
    if(out.bookingStatus==='Confirmed' && !out.calendarSynced && !wasConfirmedBefore){
      render(); setTimeout(()=>{ State.syncTarget = out; render(); }, 300); return;
    }
    render(); return;
  }

  if(type==='quotation'){
    out.status = $('ff-status').value;
    if(!out.namaClient.trim() || !out.tarikhEvent){ showFormWarn('Client Name and Event Date are required.'); return; }
    delete out._isNew;
    const exists = State.quotations.some(x=>x.id===out.id);
    State.quotations = exists ? State.quotations.map(x=>x.id===out.id?out:x) : [...State.quotations, out];
    persist('quotations'); State.formModal = null; showToast('Quotation saved.'); render(); return;
  }

  if(type==='staff'){
    out.paymentStatus = $('ff-paymentStatus').value; out.paymentDate = $('ff-paymentDate').value;
    if(!out.staffName.trim() || !out.eventDate){ showFormWarn('Staff Name and Event Date are required.'); return; }
    delete out._isNew;
    const exists = State.staff.some(x=>x.id===out.id);
    State.staff = exists ? State.staff.map(x=>x.id===out.id?out:x) : [...State.staff, out];
    persist('staff'); State.formModal = null; showToast('Staff allowance entry saved.'); render(); return;
  }

  if(type==='expense'){
    if(!out.category || !out.date || num(out.amount)<=0){ showFormWarn('Date, Category, and a valid Amount are required.'); return; }
    delete out._isNew;
    const exists = State.expenses.some(x=>x.id===out.id);
    State.expenses = exists ? State.expenses.map(x=>x.id===out.id?out:x) : [...State.expenses, out];
    persist('expenses'); State.formModal = null; showToast('Expense entry saved.'); render(); return;
  }
}
function showFormWarn(msg){ const w=$('form-warn'), t=$('form-warn-text'); w.style.display='flex'; t.textContent=msg; }

/* ======================= PDF ACTIONS ======================= */
function handlePdfAction(action){
  const [mode, docType] = action.split(':');
  const { kind, obj } = State.docModal;
  let doc, filename, waPhone, waName;
  if(kind==='booking'){
    if(docType==='Booking Summary'){ doc = buildBookingSummaryPDF(obj); filename = `booking-summary-${obj.namaClient}.pdf`; }
    else if(docType==='Invoice'){ doc = buildInvoicePDF(obj); filename = `invoice-${obj.namaClient}.pdf`; }
    else { doc = buildReceiptPDF(obj); filename = `receipt-${obj.namaClient}.pdf`; }
    waPhone = obj.noHpClient; waName = obj.namaClient;
  } else if(kind==='quotation'){
    doc = buildQuotationPDF(obj); filename = `quotation-${obj.quotationNumber}.pdf`; waPhone = obj.noHpClient; waName = obj.namaClient;
  } else {
    doc = buildStaffPDF(obj); filename = `staff-allowance-${obj.staffName}.pdf`; waPhone = obj.staffPhone; waName = obj.staffName;
  }
  filename = filename.replace(/[^a-z0-9.\- ]/gi,'').replace(/\s+/g,'-').toLowerCase();

  if(mode==='download'){ doc.save(filename); showToast('PDF downloaded.'); }
  else if(mode==='print'){ doc.autoPrint(); window.open(doc.output('bloburl'), '_blank'); }
  else if(mode==='wa'){
    doc.save(filename);
    window.open(waLink(waPhone, `Hi ${waName}, please find your ${docType} from Kerlip Photobooth attached (downloaded as ${filename}).`), '_blank');
    showToast('PDF downloaded — attach it in the WhatsApp chat that just opened.');
  } else if(mode==='mail'){
    doc.save(filename);
    const subject = encodeURIComponent(`Kerlip Photobooth — ${docType}`);
    const body = encodeURIComponent(`Hi ${waName},\n\nPlease find attached your ${docType} from Kerlip Photobooth (downloaded as ${filename}).\n\nThank you,\nKerlip Photobooth`);
    window.open(`mailto:?subject=${subject}&body=${body}`, '_blank');
    showToast('PDF downloaded — attach it to the email draft that just opened.');
  }
}

function exportAccountsExcel(year){
  const st = computeAccountStatement(year);
  const wb = XLSX.utils.book_new();

  const dashRows = [
    [`Kerlip Photobooth - ${year} Account Statement Dashboard`],
    [],
    ['Metric','Amount','','Month',...MONTHS],
    ['Total Revenue', st.totalRevenue, '', 'Revenue', ...st.revTotal],
    ['Total OPEX', st.totalOpex, '', 'OPEX', ...st.opexTotal],
    ['Total CAPEX', st.totalCapex, '', 'Net Profit', ...st.netProfit],
    ['Gross Profit', st.grossProfit, '', 'Closing Cash', ...st.closing],
    ['Net Profit', st.netProfitYear],
    ['Closing Cash Balance', st.closingCashBalance],
    [],
    ['','','','Cash Flow Summary','Amount'],
    ['','','','Opening Cash Balance', st.opening[0]],
    ['','','','Cash Inflow', st.totalRevenue],
    ['','','','Cash Outflow', st.totalOpex+st.totalCapex],
    ['','','','Net Cash Flow', st.netProfitYear-st.totalCapex],
    ['','','','Closing Cash Balance', st.closingCashBalance],
    ['','','','Profit Margin', st.profitMargin],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dashRows), 'Dashboard');

  const incRows = [
    [`Kerlip Photobooth - Monthly Income Statement ${year}`], [],
    ['Category',...MONTHS,'Grand Total'],
    ['REVENUE'],
    ...REVENUE_CATEGORIES.map(c=>[c,...st.revByCat[c],st.revByCat[c].reduce((a,b)=>a+b,0)]),
    ['Total Revenue',...st.revTotal, st.totalRevenue],
    [],
    ['OPEX'],
    ...OPEX_CATEGORIES.map(c=>[c,...st.opexByCat[c],st.opexByCat[c].reduce((a,b)=>a+b,0)]),
    ['Total Operating Expenses',...st.opexTotal, st.totalOpex],
    [],
    ['Net Profit',...st.netProfit, st.netProfitYear],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(incRows), 'Monthly Income Statement');

  const cfRows = [
    [`Cash Flow Statement ${year}`], [],
    ['Cash Flow Item',...MONTHS,'Grand Total'],
    ['Opening Cash Balance',...st.opening, st.opening[0]],
    ['Cash Inflow',...st.inflow, st.totalRevenue],
    ['Cash Outflow - OPEX',...st.opexTotal, st.totalOpex],
    ['Cash Outflow - CAPEX',...st.capexByMonth, st.totalCapex],
    ['Total Cash Outflow',...st.outflow, st.totalOpex+st.totalCapex],
    ['Net Cash Flow',...st.netCash, st.netProfitYear-st.totalCapex],
    ['Closing Cash Balance',...st.closing, st.closingCashBalance],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(cfRows), 'Cash Flow Statement');

  const expRows = State.expenses.filter(e=>!e.date||e.date.slice(0,4)===year).map(e=>({
    'Date': e.date, 'Category': e.category, 'OPEX / CAPEX': e.type, 'Description': e.description,
    'Supplier': e.supplier, 'Payment Method': e.paymentMethod, 'Amount': num(e.amount),
    'Receipt Available?': e.receiptAvailable, 'Notes': e.notes,
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(expRows), 'Expense Tracker');

  const revRows = State.bookings.filter(b=>b.tarikhEvent && b.tarikhEvent.slice(0,4)===year).map(b=>({
    'Date': b.tarikhEvent, 'Client Name': b.namaClient, 'Event Type': b.jenisEvent, 'Location': b.lokasiEvent,
    'Package': b.pakej, 'Revenue Category': REVENUE_CATEGORIES.includes(b.revenueCategory)?b.revenueCategory:guessRevenueCategory(b),
    'Total Invoice Amount': num(b.jumlahKeseluruhan), 'Amount Paid': b.paymentStatus==='Paid'?num(b.jumlahKeseluruhan):num(b.bayaranDeposit),
    'Balance': num(b.jumlahKeseluruhan)-num(b.bayaranDeposit), 'Payment Status': b.paymentStatus, 'Booking Status': b.bookingStatus,
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(revRows), 'Event Revenue Tracker');

  XLSX.writeFile(wb, `kerlip-account-statement-${year}.xlsx`);
  showToast('Account statement Excel downloaded.');
}

function exportAccountsPDF(year){
  const st = computeAccountStatement(year);
  const doc = new window.jspdf.jsPDF();
  docHeader(doc, 'Account Statement', year);
  let y = 34;
  y = docSectionTitle(doc, `Summary — ${year}`, y);
  doc.autoTable({
    startY: y, theme:'grid', margin:{left:16,right:16},
    headStyles:{fillColor:[28,24,21],textColor:[239,228,196],fontSize:8}, styles:{fontSize:8,cellPadding:2.5},
    head:[['Total Revenue','Total OPEX','Total CAPEX','Gross Profit','Net Profit','Profit Margin','Closing Cash']],
    body:[[rmVal(st.totalRevenue),rmVal(st.totalOpex),rmVal(st.totalCapex),rmVal(st.grossProfit),rmVal(st.netProfitYear),(st.profitMargin*100).toFixed(1)+'%',rmVal(st.closingCashBalance)]],
  });
  y = doc.lastAutoTable.finalY + 10;
  y = docSectionTitle(doc, 'Monthly Income Statement', y);
  doc.autoTable({
    startY:y, theme:'grid', margin:{left:16,right:16},
    headStyles:{fillColor:[28,24,21],textColor:[239,228,196],fontSize:7}, styles:{fontSize:6.5,cellPadding:1.6},
    head:[['Category',...MONTHS,'Total']],
    body:[
      ...REVENUE_CATEGORIES.filter(c=>st.revByCat[c].some(v=>v)).map(c=>[c,...st.revByCat[c].map(v=>rmVal(v)),rmVal(st.revByCat[c].reduce((a,b)=>a+b,0))]),
      ['Total Revenue',...st.revTotal.map(v=>rmVal(v)),rmVal(st.totalRevenue)],
      ...OPEX_CATEGORIES.filter(c=>st.opexByCat[c].some(v=>v)).map(c=>[c,...st.opexByCat[c].map(v=>rmVal(v)),rmVal(st.opexByCat[c].reduce((a,b)=>a+b,0))]),
      ['Total OPEX',...st.opexTotal.map(v=>rmVal(v)),rmVal(st.totalOpex)],
      ['Net Profit',...st.netProfit.map(v=>rmVal(v)),rmVal(st.netProfitYear)],
    ],
  });
  y = doc.lastAutoTable.finalY + 10;
  y = docSectionTitle(doc, 'Cash Flow Statement', y);
  doc.autoTable({
    startY:y, theme:'grid', margin:{left:16,right:16},
    headStyles:{fillColor:[28,24,21],textColor:[239,228,196],fontSize:7}, styles:{fontSize:6.5,cellPadding:1.6},
    head:[['Item',...MONTHS,'Total']],
    body:[
      ['Opening Cash',...st.opening.map(v=>rmVal(v)),rmVal(st.opening[0])],
      ['Cash Inflow',...st.inflow.map(v=>rmVal(v)),rmVal(st.totalRevenue)],
      ['Cash Outflow',...st.outflow.map(v=>rmVal(v)),rmVal(st.totalOpex+st.totalCapex)],
      ['Closing Cash',...st.closing.map(v=>rmVal(v)),rmVal(st.closingCashBalance)],
    ],
  });
  footerNote(doc);
  doc.save(`kerlip-account-statement-${year}.pdf`);
  showToast('Account statement PDF downloaded.');
}
